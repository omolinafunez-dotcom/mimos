<h5 class="mb-3">Agregar Productos a la Orden</h5>

<div class="row mb-4 align-items-end">
    <!-- CATEGORÍA -->
    <div class="col-md-4">
        <label class="form-label">Categoría</label>
        <select id="categoriaSelect" class="form-select" onchange="cargarProductos()">
            <option value="">Seleccione una categoría</option>
            <option value="Bebidas">Bebidas</option>
            <option value="Envases">Envases</option>
            <option value="Insumos">Insumos</option>
        </select>
    </div>

    <!-- PRODUCTO -->
    <div class="col-md-4">
        <label class="form-label">Producto</label>
        <select id="productoSelect" class="form-select" disabled>
            <option value="">Seleccione un producto</option>
        </select>
    </div>

    <!-- CANTIDAD -->
    <div class="col-md-2">
        <label class="form-label">Cantidad</label>
        <input type="number" id="cantidadInput" class="form-control" min="1">
    </div>

    <!-- BOTÓN -->
    <div class="col-md-2">
        <button class="btn btn-success w-100" onclick="agregarProducto()">
            Agregar
        </button>
    </div>
</div>
<h5 class="mb-3">Detalle de la Orden</h5>
